#pipeline
name: Deploy EC2 via CloudFormation

on:

  push:

    branches:

      - main

permissions:

  id-token: write

  contents: read

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code

        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy CloudFormation Stack
        run: |
          aws cloudformation deploy --template-file ec2-template.yaml --stack-name github-ec2-stack --parameter-overrides file://dev-params.json --capabilities CAPABILITY_NAMED_IAM --no-fail-on-empty-changeset

      - name: Get Stack Outputs
        run: |
          aws cloudformation describe-stacks --stack-name github-ec2-stack --query "Stacks[0].Outputs"
 
